<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hệ thống đăng ký học phần</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="toast" class="toast" aria-live="polite"></div>

    <main id="auth-screen" class="auth-screen">
        <section class="auth-panel">
            <div class="brand-block">
                <p class="eyebrow">University Course Registration</p>
                <h1>Đăng ký học phần</h1>
            </div>

            <form id="login-form" class="form-stack">
                <label>
                    <span>Tài khoản</span>
                    <input name="login" type="text" autocomplete="username" placeholder="2251120001 hoặc admin@ut.edu.vn" required>
                </label>
                <label>
                    <span>Mật khẩu</span>
                    <input name="password" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu" required>
                </label>
                <button class="primary-button" type="submit">Đăng nhập</button>
                <button class="link-button" type="button" data-action="show-forgot">Quên mật khẩu</button>
            </form>

            <form id="forgot-form" class="form-stack hidden">
                <label>
                    <span>Email đã xác thực</span>
                    <input name="email" type="email" autocomplete="email" placeholder="annm0001@ut.edu.vn" required>
                </label>
                <button class="primary-button" type="submit">Tạo mật khẩu tạm thời</button>
                <button class="link-button" type="button" data-action="show-login">Quay lại đăng nhập</button>
                <p id="reset-result" class="reset-result"></p>
            </form>
        </section>
    </main>

    <main id="app-shell" class="app-shell hidden">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="mark">CR</span>
                <div>
                    <strong>CourseReg</strong>
                    <small id="role-label">Dashboard</small>
                </div>
            </div>
            <nav id="nav" class="nav-list"></nav>
        </aside>

        <section class="workspace">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Hệ thống đăng ký học phần</p>
                    <h2 id="view-title">Dashboard</h2>
                </div>
                <div class="user-menu">
                    <span id="user-chip" class="user-chip"></span>
                    <button class="ghost-button" type="button" data-action="logout">Đăng xuất</button>
                </div>
            </header>
            <section id="view-root" class="view-root"></section>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
